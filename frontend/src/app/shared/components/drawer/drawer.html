@if (open) {
  <div class="drawer-root">
    <button
      class="drawer-backdrop"
      type="button"
      aria-label="Close panel"
      (click)="close()"
    ></button>

    <aside
      class="drawer-panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="app-drawer-title"
    >
      <header class="drawer-header">
        <div>
          <h2 id="app-drawer-title">{{ title }}</h2>

          @if (description) {
            <p>{{ description }}</p>
          }
        </div>

        <button class="drawer-close-button" type="button" aria-label="Close panel" (click)="close()">
          <i-lucide [img]="closeIcon" [size]="19" [strokeWidth]="2.25" />
        </button>
      </header>

      <div class="drawer-content">
        <ng-content />
      </div>
    </aside>
  </div>
}
