<section class="finance-summary-grid" aria-label="Financial summary">
  <article class="finance-summary-card income">
    <span class="finance-summary-icon">
      <i-lucide [img]="incomeIcon" [size]="20" [strokeWidth]="2.25" />
    </span>

    <div>
      <p>Total income</p>
      <strong>{{ formatCurrency(totalIncome) }}</strong>
      <small>Recorded income</small>
    </div>
  </article>

  <article class="finance-summary-card expense">
    <span class="finance-summary-icon">
      <i-lucide [img]="expenseIcon" [size]="20" [strokeWidth]="2.25" />
    </span>

    <div>
      <p>Total expenses</p>
      <strong>{{ formatCurrency(totalExpense) }}</strong>
      <small>Recorded expenses</small>
    </div>
  </article>

  <article class="finance-summary-card balance">
    <span class="finance-summary-icon">
      <i-lucide [img]="balanceIcon" [size]="20" [strokeWidth]="2.25" />
    </span>

    <div>
      <p>Net balance</p>
      <strong>{{ formatCurrency(netBalance) }}</strong>
      <small>Income minus expenses</small>
    </div>
  </article>
</section>
