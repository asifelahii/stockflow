<div class="sidebar" [class.collapsed]="collapsed">
  <div class="sidebar-brand">
    <a class="brand-link" routerLink="/app/dashboard" aria-label="Go to StockFlow dashboard">
      <div class="brand-mark" aria-hidden="true">
        <img src="stockflow-icon.svg" alt="" class="brand-logo" />
      </div>

      <div class="brand-copy">
        <h1>StockFlow</h1>
        <p>Inventory intelligence</p>
      </div>
    </a>

    <button
      class="sidebar-collapse-button"
      type="button"
      [attr.aria-label]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'"
      [title]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'"
      (click)="toggleCollapse()"
    >
      <i-lucide
        class="sidebar-collapse-icon"
        [img]="collapsed ? expandIcon : collapseIcon"
        [size]="18"
        [strokeWidth]="2.4"
        aria-hidden="true"
      />
    </button>
  </div>

  <nav class="sidebar-nav" aria-label="Main navigation">
    @for (section of sections; track section.title) {
      <section class="nav-section">
        <p class="nav-section-title">{{ section.title }}</p>

        <div class="nav-links">
          @for (link of section.links; track link.route) {
            <a
              class="nav-link"
              [routerLink]="link.route"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              [title]="collapsed ? link.label : ''"
            >
              <span class="nav-link-icon" aria-hidden="true">
                <i-lucide
                  class="nav-link-icon-svg"
                  [img]="link.icon"
                  [size]="18"
                  [strokeWidth]="2.2"
                />
              </span>

              <span class="nav-link-label">{{ link.label }}</span>
            </a>
          }
        </div>
      </section>
    }
  </nav>

  <section class="workspace-card" [title]="collapsed ? workspaceName : ''">
    <span class="workspace-avatar">{{ workspaceInitial }}</span>

    <div class="workspace-copy">
      <p>Current workspace</p>
      <strong>{{ workspaceName }}</strong>
    </div>

    <i-lucide
      class="workspace-icon"
      [img]="workspaceIcon"
      [size]="17"
      [strokeWidth]="2.2"
      aria-hidden="true"
    />
  </section>
</div>
