<div class="topbar">
  <div>
    <p class="topbar-kicker">Business workspace</p>
    <h2>StockFlow Dashboard</h2>
  </div>

  <div class="topbar-actions">
    <div class="quick-actions" [class.open]="isQuickActionsOpen">
      <button
        class="quick-action-trigger"
        type="button"
        aria-haspopup="menu"
        [attr.aria-expanded]="isQuickActionsOpen"
        title="Quick Add"
        (click)="toggleQuickActions()"
      >
        <span class="quick-action-plus" aria-hidden="true">
          <i-lucide
            class="quick-action-plus-icon"
            [img]="plusIcon"
            [size]="16"
            [strokeWidth]="2.8"
          />
        </span>

        <span class="quick-action-label">Quick Add</span>
      </button>

      @if (isQuickActionsOpen) {
        <div class="quick-actions-menu" role="menu">
          <div class="quick-actions-header">
            <p>Quick Add</p>
            <small>Create records faster</small>
          </div>

          @for (action of quickActions; track action.route) {
            <a
              class="quick-action-item"
              role="menuitem"
              [routerLink]="action.route"
              (click)="closeQuickActions()"
            >
              <span class="quick-action-icon" aria-hidden="true">
                <i-lucide
                  class="quick-action-icon-svg"
                  [img]="action.icon"
                  [size]="18"
                  [strokeWidth]="2.25"
                />
              </span>

              <span>
                <strong>{{ action.label }}</strong>
                <small>{{ action.description }}</small>
              </span>
            </a>
          }
        </div>
      }
    </div>

    <button
      class="theme-toggle-button"
      type="button"
      [attr.aria-label]="themeToggleLabel"
      [title]="themeToggleLabel"
      (click)="toggleTheme()"
    >
      <span class="theme-icon" aria-hidden="true">
        <i-lucide
          class="theme-icon-svg"
          [img]="isDarkMode ? sunIcon : moonIcon"
          [size]="18"
          [strokeWidth]="2.35"
        />
      </span>
    </button>

    <div class="user-pill">
      <span class="user-avatar">{{ userInitial }}</span>

      <div>
        <p>{{ currentUser?.full_name || 'User' }}</p>
        <small>{{ currentUser?.role || 'Staff' }}</small>
      </div>
    </div>

    <button class="logout-button" type="button" (click)="logout()">Logout</button>
  </div>
</div>
