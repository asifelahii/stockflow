<div class="auth-card">
  <div class="auth-card-header">
    <p class="auth-kicker">Create account</p>
    <h2>Start using StockFlow</h2>
    <p>Create an account to manage products, stock activity, suppliers, and business finance.</p>
  </div>

  @if (errorMessage) {
    <div class="auth-alert auth-alert-error">
      {{ errorMessage }}
    </div>
  }

  @if (successMessage) {
    <div class="auth-alert auth-alert-success">
      {{ successMessage }}
    </div>
  }

  <form class="auth-form" (ngSubmit)="handleRegister()">
    <div class="form-group">
      <label class="form-label" for="fullName">Full name</label>
      <input
        id="fullName"
        class="form-control"
        type="text"
        name="fullName"
        placeholder="Admin User"
        [(ngModel)]="fullName"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input
        id="email"
        class="form-control"
        type="email"
        name="email"
        placeholder="admin@example.com"
        [(ngModel)]="email"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input
        id="password"
        class="form-control"
        type="password"
        name="password"
        placeholder="Create a secure password"
        [(ngModel)]="password"
      />
    </div>

    <button class="btn btn-primary auth-submit" type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Creating account...' : 'Create account' }}
    </button>
  </form>

  <p class="auth-switch">
    Already have an account?
    <a routerLink="/auth/login">Sign in</a>
  </p>
</div>
