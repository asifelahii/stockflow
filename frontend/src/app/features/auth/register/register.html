<div class="auth-card">
  <div class="auth-card-header">
    <p class="auth-kicker">Create account</p>
    <h2>Start using StockFlow</h2>
    <p>Create an account to manage products, stock activity, suppliers, and business finance.</p>
  </div>

  <form class="auth-form">
    <div class="form-group">
      <label class="form-label" for="fullName">Full name</label>
      <input
        id="fullName"
        class="form-control"
        type="text"
        placeholder="Admin User"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input
        id="email"
        class="form-control"
        type="email"
        placeholder="admin@example.com"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input
        id="password"
        class="form-control"
        type="password"
        placeholder="Create a secure password"
      />
    </div>

    <button class="btn btn-primary auth-submit" type="button">
      Create account
    </button>
  </form>

  <p class="auth-switch">
    Already have an account?
    <a routerLink="/auth/login">Sign in</a>
  </p>
</div>
