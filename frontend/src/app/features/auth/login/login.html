<div class="auth-card">
  <div class="auth-card-header">
    <p class="auth-kicker">Welcome back</p>
    <h2>Sign in to StockFlow</h2>
    <p>Access your inventory, stock movement, and finance dashboard.</p>
  </div>

  <form class="auth-form">
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input
        id="email"
        class="form-control"
        type="email"
        placeholder="admin@example.com"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input
        id="password"
        class="form-control"
        type="password"
        placeholder="Enter your password"
      />
    </div>

    <button class="btn btn-primary auth-submit" type="button" (click)="handleDemoLogin()">Sign in</button>
  </form>

  <p class="auth-switch">
    Do not have an account?
    <a routerLink="/auth/register">Create one</a>
  </p>
</div>
