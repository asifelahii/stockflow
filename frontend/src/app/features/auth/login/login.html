<div class="auth-card">
  <div class="auth-card-header">
    <p class="auth-kicker">Welcome back</p>
    <h2>Sign in to StockFlow</h2>
    <p>Access your inventory, stock movement, and finance dashboard.</p>
  </div>

  @if (errorMessage) {
    <div class="auth-alert">
      {{ errorMessage }}
    </div>
  }

  <form class="auth-form" (ngSubmit)="handleLogin()">
    <div class="form-group">
      <label class="form-label" for="email">Email address</label>
      <input
        id="email"
        class="form-control"
        type="email"
        name="email"
        placeholder="admin@example.com"
        [(ngModel)]="email"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input
        id="password"
        class="form-control"
        type="password"
        name="password"
        placeholder="Enter your password"
        [(ngModel)]="password"
      />
    </div>

    <button class="btn btn-primary auth-submit" type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Signing in...' : 'Sign in' }}
    </button>
  </form>

  <p class="auth-switch">
    Do not have an account?
    <a routerLink="/auth/register">Create one</a>
  </p>
</div>
