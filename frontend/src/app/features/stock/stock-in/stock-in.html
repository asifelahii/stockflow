<section class="stock-form-page">
  <app-page-header
    title="Stock In"
    description="Record incoming stock from purchases, returns, or corrections."
  />

  @if (errorMessage) {
    <section class="form-alert form-alert-error">
      {{ errorMessage }}
    </section>
  }

  @if (successMessage) {
    <section class="form-alert form-alert-success">
      {{ successMessage }}
    </section>
  }

  <section class="stock-form-card card">
    <form class="stock-form" (ngSubmit)="handleSubmit()">
      <div class="form-group">
        <label class="form-label" for="product">Product</label>
        <select
          id="product"
          class="form-control"
          name="productId"
          [(ngModel)]="productId"
          [disabled]="isLoading || isSubmitting"
        >
          <option value="">{{ isLoading ? 'Loading products...' : 'Select product' }}</option>
          @for (product of products; track product.id) {
            <option [value]="product.id">
              {{ product.name }} — Current stock: {{ product.current_stock }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="quantity">Quantity to add</label>
        <input
          id="quantity"
          class="form-control"
          type="number"
          min="1"
          name="quantity"
          placeholder="Enter quantity"
          [(ngModel)]="quantity"
          [disabled]="isSubmitting"
        />
      </div>

      <div class="form-group full-width">
        <label class="form-label" for="reason">Reason / Note</label>
        <textarea
          id="reason"
          class="form-control"
          rows="4"
          name="reason"
          placeholder="Example: Purchase received from supplier"
          [(ngModel)]="reason"
          [disabled]="isSubmitting"
        ></textarea>
      </div>

      <div class="form-actions full-width">
        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Recording...' : 'Record Stock In' }}
        </button>
        <button class="btn btn-secondary" type="button" routerLink="/app/stock/movements">
          Cancel
        </button>
      </div>
    </form>
  </section>
</section>
