<section class="stock-form-page">
  <app-page-header
    title="Stock Adjustment"
    description="Correct product stock after physical count, mismatch, or manual verification."
  />

  <section class="notice-card">
    <strong>Adjustment note:</strong>
    Use stock adjustment only when the actual physical stock does not match the system stock.
  </section>

  @if (errorMessage) {
    <section class="form-alert form-alert-error">
      {{ errorMessage }}
    </section>
  }

  @if (successMessage) {
    <section class="form-alert form-alert-success">
      {{ successMessage }}
    </section>
  }

  <section class="stock-form-card card">
    <form class="stock-form" (ngSubmit)="handleSubmit()">
      <div class="form-group">
        <label class="form-label" for="product">Product</label>
        <select
          id="product"
          class="form-control"
          name="productId"
          [(ngModel)]="productId"
          [disabled]="isLoading || isSubmitting"
        >
          <option value="">{{ isLoading ? 'Loading products...' : 'Select product' }}</option>
          @for (product of products; track product.id) {
            <option [value]="product.id">
              {{ product.name }} — Current stock: {{ product.current_stock }}
            </option>
          }
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="newStock">New stock quantity</label>
        <input
          id="newStock"
          class="form-control"
          type="number"
          min="0"
          name="newStock"
          placeholder="Enter corrected stock"
          [(ngModel)]="newStock"
          [disabled]="isSubmitting"
        />
      </div>

      <div class="form-group full-width">
        <label class="form-label" for="reason">Adjustment reason</label>
        <textarea
          id="reason"
          class="form-control"
          rows="4"
          name="reason"
          placeholder="Example: Physical stock count correction"
          [(ngModel)]="reason"
          [disabled]="isSubmitting"
        ></textarea>
      </div>

      <div class="form-actions full-width">
        <button class="btn btn-primary" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Saving...' : 'Save Adjustment' }}
        </button>
        <button class="btn btn-secondary" type="button" routerLink="/app/stock/movements">
          Cancel
        </button>
      </div>
    </form>
  </section>
</section>
