<section class="suppliers-page">
  <app-page-header
    title="Suppliers"
    description="Manage supplier contacts and supplier-related inventory records."
    actionLabel="+ Add Supplier"
  />

  <section class="toolbar card">
    <div>
      <label class="form-label" for="supplierSearch">Search suppliers</label>
      <input
        id="supplierSearch"
        class="form-control"
        type="text"
        placeholder="Search by supplier name, contact, phone, email, or status"
        [(ngModel)]="searchTerm"
      />
    </div>
  </section>

  @if (filteredSuppliers.length > 0) {
    <section class="table-wrapper">
      <table class="app-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Contact Person</th>
            <th>Phone</th>
            <th>Email</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          @for (supplier of filteredSuppliers; track supplier.name) {
            <tr>
              <td><strong>{{ supplier.name }}</strong></td>
              <td>{{ supplier.contactPerson }}</td>
              <td>{{ supplier.phone }}</td>
              <td>{{ supplier.email }}</td>
              <td>
                <app-badge [label]="supplier.status" [tone]="supplier.tone" />
              </td>
              <td>
                <div class="table-actions">
                  <button type="button" title="View will be added later">View</button>
                  <button type="button" title="Edit will be added later">Edit</button>
                  <button class="danger" type="button" title="Delete will be added later">Delete</button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </section>
  } @else {
    <app-empty-state
      title="No suppliers found"
      message="Try changing the search term."
    />
  }
</section>
