<section class="categories-page">
  <app-page-header
    title="Product Categories"
    description="Organize inventory products into meaningful business categories."
    actionLabel="+ Add Category"
  />

  <section class="toolbar card">
    <div>
      <label class="form-label" for="categorySearch">Search categories</label>
      <input
        id="categorySearch"
        class="form-control"
        type="text"
        placeholder="Search by category name, description, or status"
        [(ngModel)]="searchTerm"
      />
    </div>
  </section>

  @if (isLoading) {
    <app-loading-state message="Loading product categories..." />
  } @else if (errorMessage) {
    <app-empty-state
      title="Product categories could not be loaded"
      [message]="errorMessage"
    />
  } @else if (filteredCategories.length > 0) {
    <section class="table-wrapper">
      <table class="app-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Description</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          @for (category of filteredCategories; track category.id) {
            <tr>
              <td><strong>{{ category.name }}</strong></td>
              <td>{{ category.description || '—' }}</td>
              <td>
                <app-badge
                  [label]="getCategoryStatus(category)"
                  [tone]="getCategoryTone(category)"
                />
              </td>
              <td>
                <div class="table-actions">
                  <button type="button" title="Edit will be added later">Edit</button>
                  <button class="danger" type="button" title="Delete will be added later">Delete</button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </section>
  } @else {
    <app-empty-state
      title="No categories found"
      message="Try changing the search term."
    />
  }
</section>
