<svg width="900" height="240" viewBox="0 0 900 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">StockFlow Logo</title>
  <desc id="desc">StockFlow inventory and business dashboard logo with box, bar chart, and flow arrow icon.</desc>
  <defs>
    <linearGradient id="stockflow-blue" x1="58" y1="188" x2="228" y2="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA"/>
      <stop offset="0.45" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#0F6BFF"/>
    </linearGradient>
    <linearGradient id="stockflow-navy" x1="112" y1="66" x2="222" y2="170" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <filter id="soft-shadow" x="0" y="0" width="260" height="220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <rect x="34" y="138" width="18" height="50" rx="5" fill="#93C5FD"/>
    <rect x="61" y="115" width="18" height="73" rx="5" fill="#60A5FA"/>
    <rect x="88" y="86" width="18" height="102" rx="5" fill="#2563EB"/>

    <path d="M128 78L189 110V178L128 146V78Z" fill="url(#stockflow-navy)"/>
    <path d="M189 110L248 80V148L189 178V110Z" fill="#0B1F3F"/>
    <path d="M128 78L187 48L248 80L189 110L128 78Z" fill="#0F6BFF"/>
    <path d="M153 91L213 61L231 70L171 101L153 91Z" fill="#EFF6FF" opacity="0.95"/>
    <path d="M189 110L189 178" stroke="#EFF6FF" stroke-width="8" stroke-linecap="round"/>
    <path d="M128 78L189 110" stroke="#EFF6FF" stroke-width="8" stroke-linecap="round"/>

    <path d="M34 197C92 215 169 205 221 166" stroke="url(#stockflow-blue)" stroke-width="13" stroke-linecap="round"/>
    <path d="M218 165L257 150L241 190L229 172L218 165Z" fill="#0F6BFF"/>
  </g>

  <text x="310" y="145" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-3" fill="#0F172A">Stock</text>
  <text x="525" y="145" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-3" fill="#2563EB">Flow</text>
</svg>
